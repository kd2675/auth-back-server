server:
  forward-headers-strategy: framework

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:auth-back-server/.env[.properties]
  application:
    name: auth-back-server
  profiles:
    active: local
    group:
      local: local
      test: test
      dev: dev
      prod: prod
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
  cloud:
    discovery:
      client:
        serviceUrl:
          defaultZone: http://localhost:8761/eureka/

  security:
    oauth2:
      client:
        registration:
          naver-muse:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            provider: naver
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          naver-zeroq-service:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            provider: naver
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          naver-zeroq-admin:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            provider: naver
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          naver-semo:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            provider: naver
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          kakao-muse:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            provider: kakao
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
          kakao-zeroq-service:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            provider: kakao
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
          kakao-zeroq-admin:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            provider: kakao
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
          kakao-semo:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            provider: kakao
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
app:
  jwt:
    secret: ${AUTH_JWT_SECRET}
#    access-token-expiration-ms: 3600000
#    refresh-token-expiration-ms: 1209600000
    access-token-expiration-ms: 600000 #10분
    refresh-token-expiration-ms: 3000000 #30분
  security:
    issuer: http://localhost:9000
  oauth2:
    front-clients:
      muse:
        client-id: muse-front-service
        redirect-uri: http://localhost:3000/login/oauth2/code/muse-front-service
        post-logout-redirect-uri: http://localhost:3000
      zeroq-service:
        client-id: zeroq-front-service
        redirect-uri: http://localhost:3001/login/oauth2/code/zeroq-front-service
        post-logout-redirect-uri: http://localhost:3001
      zeroq-admin:
        client-id: zeroq-front-admin
        redirect-uri: http://localhost:3002/login/oauth2/code/zeroq-front-admin
        post-logout-redirect-uri: http://localhost:3002
      semo:
        client-id: semo-front-service
        redirect-uri: http://localhost:3003/login/oauth2/code/semo-front-service
        post-logout-redirect-uri: http://localhost:3003
    social:
      default-redirect-uri: http://localhost:3001/login
      redirect-uris:
        muse: http://localhost:3000/login
        zeroq-service: http://localhost:3001/login
        zeroq-admin: http://localhost:3002/login
        semo: http://localhost:3003/login
  signup:
    manager-secret: ${AUTH_MANAGER_SIGNUP_SECRET:1234}

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
