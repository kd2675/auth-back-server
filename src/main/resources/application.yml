spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:auth-back-server/.env[.properties]
  application:
    name: auth-back-server
  profiles:
    active: local
    group:
      local: local
      test: test
      dev: dev
      prod: prod
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
  cloud:
    discovery:
      client:
        serviceUrl:
          defaultZone: http://localhost:8761/eureka/

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: Naver
            authorization-grant-type: authorization_code
#            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            redirect-uri: http://localhost:9000/login/oauth2/code/naver
            scope:
              - name
              - email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
app:
  jwt:
    secret: ${AUTH_JWT_SECRET}
#    access-token-expiration-ms: 3600000
#    refresh-token-expiration-ms: 1209600000
    access-token-expiration-ms: 60000
    refresh-token-expiration-ms: 90000
  security:
    issuer: http://localhost:9000
  oauth2:
    client:
      web:
        client-id: zeroq-web
        redirect-uri: http://localhost:3000/login/oauth2/code/zeroq
        post-logout-redirect-uri: http://localhost:3000
      service:
        redirect-uri: http://localhost:3000/login

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
