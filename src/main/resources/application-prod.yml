server:
  port: 10180

eureka:
  client:
    service-url:
      defaultZone: http://kimd0.iptime.org:10210/eureka/  # 유레카 서버 주소
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

spring:
  config:
    activate:
      on-profile: prod

app:
  auth:
    refresh-cookie:
      secure: true
      same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
  security:
    issuer: ${AUTH_ISSUER}
  cors:
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS}
  oauth2:
    front-clients:
      muse:
        redirect-uri: ${MUSE_FRONT_BASE_URL}/login/oauth2/code/muse-front-service
        post-logout-redirect-uri: ${MUSE_FRONT_BASE_URL}
      zeroq-service:
        redirect-uri: ${ZEROQ_FRONT_BASE_URL}/login/oauth2/code/zeroq-front-service
        post-logout-redirect-uri: ${ZEROQ_FRONT_BASE_URL}
      zeroq-admin:
        redirect-uri: ${ZEROQ_ADMIN_BASE_URL}/login/oauth2/code/zeroq-front-admin
        post-logout-redirect-uri: ${ZEROQ_ADMIN_BASE_URL}
      semo:
        redirect-uri: ${SEMO_FRONT_BASE_URL}/login/oauth2/code/semo-front-service
        post-logout-redirect-uri: ${SEMO_FRONT_BASE_URL}
      stock:
        redirect-uri: ${STOCK_FRONT_BASE_URL}/login/oauth2/code/stock-front-service
        post-logout-redirect-uri: ${STOCK_FRONT_BASE_URL}
    social:
      default-redirect-uri: ${ZEROQ_FRONT_BASE_URL}/login
      redirect-uris:
        muse: ${MUSE_FRONT_BASE_URL}/login
        zeroq-service: ${ZEROQ_FRONT_BASE_URL}/login
        zeroq-admin: ${ZEROQ_ADMIN_BASE_URL}/login
        semo: ${SEMO_FRONT_BASE_URL}/login
        stock: ${STOCK_FRONT_BASE_URL}/auth/callback
      failure-redirect-uris:
        stock: ${STOCK_FRONT_BASE_URL}/login

database:
  datasource:
    pub:
      master:
        url: jdbc:mysql://mysql-10490:3306/AUTH?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true&autoReconnect=true&maxReconnects=3
        username: ${AUTH_DB_USERNAME}
        password: ${AUTH_DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        maximum-pool-size: 4
        minimum-idle: 2
        connection-timeout: 30000
        maxLifetime: 1800000
      slave1:
        url: jdbc:mysql://mysql-10490:3306/AUTH?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true&autoReconnect=true&maxReconnects=3
        username: ${AUTH_DB_USERNAME}
        password: ${AUTH_DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        maximum-pool-size: 4
        minimum-idle: 1
        connection-timeout: 30000
        maxLifetime: 1800000
