server:
  port: 30180

spring:
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  batch:
    jdbc:
      initialize-schema: always
  test:
    database:
      replace: any

database:
  datasource:
    pub:
      master:
        url: jdbc:h2:mem:auth_testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER
        driver-class-name: org.h2.Driver
        username: sa
        password:
      slave1:
        url: jdbc:h2:mem:auth_testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER
        driver-class-name: org.h2.Driver
        username: sa
        password:
  jpa:
    hibernate:
      ddl-auto: create-drop
      dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: ${AUTH_JWT_SECRET:auth-test-jwt-secret-hs512-minimum-length-64-chars-1234567890-extra}
  signup:
    manager-secret: ${AUTH_MANAGER_SIGNUP_SECRET:auth-test-manager-signup-secret}

eureka:
  client:
    enabled: false
    registerWithEureka: false
    fetchRegistry: false
