server:
  port: 30180

spring:
  config:
    activate:
      on-profile: smoke
  cloud:
    discovery:
      enabled: true

eureka:
  client:
    enabled: true
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost
