spring:
  config:
    activate:
      on-profile: local-direct
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false

eureka:
  client:
    enabled: false
    registerWithEureka: false
    fetchRegistry: false

app:
  cors:
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:3005,http://127.0.0.1:3005}
